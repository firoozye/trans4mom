# Momentum Transformer Project Configuration

# Data Settings
data:
  exchange: "databento"
  dataset: "GLBX.MDP3"
  symbols: 
    - "ES.c.0"
    - "NQ.c.0"
    - "RTY.c.0"
    - "ZT.c.0"
    - "ZF.c.0"
    - "ZN.c.0"
    - "ZB.c.0"
    - "CL.c.0"
    - "NG.c.0"
    - "GC.c.0"
    - "SI.c.0"
    - "HG.c.0"
    - "6E.c.0"
    - "6J.c.0"
    - "6B.c.0"
  timeframe: "1d"
  since: "2018-01-01T00:00:00Z"
  raw_path: "data/raw/futures/"
  processed_path: "data/processed/futures_1d.parquet"

# Feature Engineering
features:
  window_sizes: [10, 21, 63, 126, 252]
  vol_window: 22
  clean_outliers: true
  outlier_threshold: 5.0  # Z-score threshold
  impute_nans: true      # If true, forward fill + backward fill. If false, drop.

# Model Hyperparameters
model:
  input_dim: 1
  num_vars: 5
  hidden_dim: 64
  num_heads: 4
  num_layers: 1
  dropout: 0.1

# Training Hyperparameters
training:
  epochs: 150
  batch_size: 64
  lr: 0.0001
  trans_cost: 0.01
  smoothing_beta: 1.0
  annualization: 365.0
  seed: 42

# HPC Settings
hpc:
  use_gpu: true
  distributed: false
  num_nodes: 1
  gpus_per_node: 1
